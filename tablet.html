<title>Charité · Patienten-Anmeldung</title>

<style>
  body{background:var(--grey-xl);}
  .t-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;gap:18px;}
  .t-wrap .brand{justify-content:center;}
  .t-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:44px 46px;max-width:460px;box-shadow:0 6px 30px rgba(0,0,0,.05);}
  .t-card h1{font-size:22px;margin:0 0 8px;}
  .t-card p{color:var(--grey);font-size:14px;margin:0 0 22px;}
  .t-btn{background:var(--black);color:#fff;border:none;border-radius:10px;padding:16px 34px;font-size:17px;font-weight:600;cursor:pointer;font-family:var(--font);}
  .t-btn:hover{background:#333;} .t-btn:disabled{opacity:.6;}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .msg{font-size:13px;padding:10px 14px;border-radius:8px;margin-top:16px;}
  .msg.err{background:var(--red-bg);color:var(--red);border:1px solid #f5c2c2;}
</style>

    <h1>Willkommen in der Reisemedizinischen Ambulanz</h1>
    <p>Bitte tippen Sie auf „Anmeldung starten" und füllen Sie anschließend Ihre Angaben aus.</p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/auth.js"></script>
<script>
function showMsg(t){ document.getElementById('msg-slot').innerHTML = t?('<div class="msg err">'+t+'</div>'):''; }
async function ensureAnon(){
  if(!AUTH_ENABLED) return true;
  const u = await getSessionUser();
  if(u) return true;                       // bereits (anonym) angemeldet – Sitzung bleibt aktiv
  const { error } = await signInAnonymously();
  if(error){ showMsg('Tablet-Modus nicht verfügbar: '+(error.message||error)+'. Bitte Personal informieren (anonyme Anmeldung in Supabase aktivieren).'); return false; }
  return true;
}
async function startIntake(){
  const btn=document.getElementById('start'); btn.disabled=true; btn.innerHTML='<span class="spinner"></span>';
  const ok = await ensureAnon();
  btn.disabled=false; btn.textContent='Anmeldung starten';
  if(ok) window.location.href='index.html';
}
(async function init(){
  document.body.style.visibility='visible';
  // Wenn das iPad schon eine (anonyme) Sitzung hat, direkt in den Kiosk.
  if(AUTH_ENABLED){ const u=await getSessionUser(); if(u){ window.location.href='index.html'; } }
})();
</script>
