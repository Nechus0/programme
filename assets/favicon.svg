<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Reisemedizin">
  <!-- Globus (reduziertes Gitter für Erkennbarkeit bei kleiner Größe) -->
  <g fill="none" stroke="#111" stroke-width="18" stroke-linecap="round">
    <circle cx="222" cy="300" r="182"/>
    <line x1="222" y1="118" x2="222" y2="482"/>
    <line x1="40" y1="300" x2="404" y2="300"/>
    <ellipse cx="222" cy="300" rx="92" ry="182"/>
  </g>
  <!-- weißer Halo hinter Kreuz, damit es klar hervortritt -->
  <g fill="#fff">
    <rect x="168" y="150" width="108" height="316" rx="10"/>
    <rect x="80" y="238" width="284" height="108" rx="10"/>
  </g>
  <!-- medizinisches Kreuz -->
  <g fill="#111">
    <rect x="182" y="164" width="80" height="288" rx="6"/>
    <rect x="94" y="252" width="256" height="80" rx="6"/>
  </g>
  <!-- Flugzeug oben rechts, fliegt weg (weißer Halo + Silhouette, größer für kleine Größen) -->
  <path fill="#fff" transform="matrix(5.30,5.30,-5.30,5.30,398,-8)"
    d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"
    stroke="#fff" stroke-width="2.2" stroke-linejoin="round"/>
  <path fill="#111" transform="matrix(5.10,5.10,-5.10,5.10,398,0)"
    d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
</svg>
